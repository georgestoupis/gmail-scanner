name: Deploy to Cloud Run

on:
  workflow_run:
    workflows: ["CodeQL"]
    branches: [main]
    types: [completed]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker europe-west1-docker.pkg.dev --quiet

      - name: Build and push
        run: |
          docker build -t europe-west1-docker.pkg.dev/gmail-scanner-347019/gmail-scanner/app:latest .
          docker push europe-west1-docker.pkg.dev/gmail-scanner-347019/gmail-scanner/app:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy gmail-scanner \
            --image europe-west1-docker.pkg.dev/gmail-scanner-347019/gmail-scanner/app:latest \
            --region europe-west1 \
            --platform managed \
            --project gmail-scanner-347019