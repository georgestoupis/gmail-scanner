<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gmail Scanner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Rubik:wght@400;500;700;900&display=swap"
      rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    /* =============================================
       DARK THEME (default) — deep purple-tinted
    ============================================= */
    :root,
    [data-theme="dark"] {
      --bg: #1a1625;
      --surface: #221d30;
      --border: #332a47;
      --card: #1e1929;
      --accent: #ff5757;
      --accent2: #ffd166;
      --teal: #06d6a0;
      --purple: #c084fc;
      --text: #ede8f5;
      --muted: #7a6e96;
      --chart-border: #1e1929;
      --tooltip-bg: #221d30;
      --tooltip-border: #332a47;
      --font-display: 'Nunito', sans-serif;
      --font-num: 'Rubik', sans-serif;
    }

    /* =============================================
       LIGHT THEME — warm cream
    ============================================= */
    [data-theme="light"] {
      --bg: #fdf8f0;
      --surface: #fff8ec;
      --border: #e8dfc8;
      --card: #ffffff;
      --accent: #e63030;
      --accent2: #c07800;
      --teal: #00a878;
      --purple: #9333ea;
      --text: #1e1530;
      --muted: #9e8fbf;
      --chart-border: #ffffff;
      --tooltip-bg: #ffffff;
      --tooltip-border: #e8dfc8;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-display);
      min-height: 100vh;
      overflow-x: hidden;
      transition: background 0.35s ease, color 0.35s ease;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 999;
      opacity: 0.35;
    }

    /* ---- HEADER ---- */
    header {
      border-bottom: 1px solid var(--border);
      padding: 1.6rem 2.5rem;
      transition: border-color 0.35s;
    }

    .header-inner {
      max-width: 1100px;
      margin: 0 auto;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-block {
      text-align: center;
    }

    .theme-toggle {
      position: absolute;
      right: 0;
    }

    .logo-block h1 {
      font-size: clamp(1.6rem, 3.5vw, 2.4rem);
      font-weight: 900;
      letter-spacing: -0.04em;
      line-height: 1;
    }

    .logo-block h1 span {
      color: var(--accent);
      transition: color 0.35s;
    }

    .logo-block p {
      font-size: 0.67rem;
      font-weight: 800;
      color: var(--muted);
      margin-top: 0.3rem;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      transition: color 0.35s;
    }

    .theme-toggle {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 50px;
      width: 56px;
      height: 30px;
      cursor: pointer;
      position: relative;
      transition: background 0.35s, border-color 0.35s;
      flex-shrink: 0;
    }

    .theme-toggle::after {
      content: '';
      position: absolute;
      top: 4px;
      left: 4px;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: var(--text);
      transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1), background 0.35s;
    }

    [data-theme="light"] .theme-toggle::after {
      transform: translateX(26px);
    }

    .toggle-icon {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      font-size: 0.7rem;
      pointer-events: none;
      transition: opacity 0.2s;
      line-height: 1;
    }

    .toggle-icon.moon {
      left: 7px;
    }

    .toggle-icon.sun {
      right: 6px;
      opacity: 0;
    }

    [data-theme="light"] .toggle-icon.moon {
      opacity: 0;
    }

    [data-theme="light"] .toggle-icon.sun {
      opacity: 1;
    }

    /* ---- MAIN ---- */
    main {
      padding: 2.5rem;
      max-width: 1100px;
      margin: 0 auto;
    }

    /* ---- CONTROLS ---- */
    .controls {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 2rem;
      flex-wrap: wrap;
    }

    .controls label {
      font-size: 0.7rem;
      font-weight: 800;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      color: var(--muted);
      transition: color 0.35s;
    }

    select, input[type="number"] {
      background: var(--surface);
      border: 1.5px solid var(--border);
      color: var(--text);
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 0.9rem;
      padding: 0.6rem 1rem;
      border-radius: 10px;
      outline: none;
      cursor: pointer;
      transition: border-color 0.2s, background 0.35s, color 0.35s;
      -webkit-appearance: none;
    }

    select:focus, input[type="number"]:focus {
      border-color: var(--accent);
    }

    input[type="number"] {
      width: 100px;
    }

    .btn-scan {
      background: var(--accent);
      color: #fff;
      font-family: var(--font-display);
      font-weight: 900;
      font-size: 0.88rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      border: none;
      padding: 0.68rem 2rem;
      cursor: pointer;
      border-radius: 10px;
      transition: filter 0.15s, transform 0.1s, background 0.35s;
      position: relative;
      overflow: hidden;
    }

    .btn-scan:hover {
      filter: brightness(1.12);
    }

    .btn-scan:active {
      transform: scale(0.97);
    }

    .btn-scan.loading::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      height: 3px;
      width: 0%;
      background: rgba(255, 255, 255, 0.5);
      animation: loadbar 1.5s ease-in-out infinite;
    }

    @keyframes loadbar {
      0% {
        width: 0%;
        left: 0;
      }
      50% {
        width: 80%;
        left: 10%;
      }
      100% {
        width: 0%;
        left: 100%;
      }
    }

    .error-msg {
      font-size: 0.84rem;
      font-weight: 700;
      color: var(--accent);
      padding: 0.8rem 1.2rem;
      border: 1.5px solid var(--accent);
      border-radius: 10px;
      display: none;
      margin-bottom: 1.5rem;
    }

    #results {
      display: none;
    }

    /* ---- STAT CARDS ---- */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 10px;
      margin-bottom: 10px;
      animation: fadeUp 0.4s ease both;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(14px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .stat-card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: 16px;
      padding: 1.4rem 1.6rem 1.2rem;
      position: relative;
      overflow: hidden;
      transition: background 0.35s, border-color 0.35s;
    }

    .stat-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      border-radius: 16px 16px 0 0;
    }

    .stat-card:nth-child(1)::before {
      background: var(--accent);
    }

    .stat-card:nth-child(2)::before {
      background: var(--accent2);
    }

    .stat-card:nth-child(3)::before {
      background: var(--teal);
    }

    .stat-card:nth-child(4)::before {
      background: var(--purple);
    }

    .stat-card::after {
      content: attr(data-emoji);
      position: absolute;
      bottom: -6px;
      right: 8px;
      font-size: 3.2rem;
      opacity: 0.08;
      pointer-events: none;
      line-height: 1;
    }

    .stat-label {
      font-size: 0.67rem;
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.45rem;
      transition: color 0.35s;
    }

    .stat-value {
      font-family: var(--font-num);
      font-size: clamp(1.3rem, 2.8vw, 2.2rem);
      font-weight: 900;
      letter-spacing: -0.03em;
      line-height: 1;
    }

    .stat-value--fit {
      white-space: nowrap;
      display: block;
    }

    /* ---- SHAME BANNER ---- */
    .result-banner {
      border: 1.5px solid var(--border);
      background: var(--surface);
      border-radius: 16px;
      padding: 1rem 1.6rem;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 1rem;
      animation: fadeUp 0.4s 0.1s ease both;
      opacity: 0;
      transition: background 0.35s, border-color 0.35s;
    }

    .result-icon {
      font-size: 1.8rem;
      flex-shrink: 0;
    }

    .result-text {
      font-size: 0.95rem;
      font-weight: 800;
      color: var(--accent2);
      line-height: 1.5;
      transition: color 0.35s;
    }

    /* ---- BOTTOM GRID ---- */
    .bottom-grid {
      display: grid;
      grid-template-columns: 1fr 1.4fr;
      gap: 10px;
      animation: fadeUp 0.4s 0.18s ease both;
      opacity: 0;
    }

    @media (max-width: 720px) {
      .bottom-grid {
        grid-template-columns: 1fr;
      }
    }

    .panel {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      transition: background 0.35s, border-color 0.35s;
    }

    .panel-header {
      padding: 0.9rem 1.4rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: border-color 0.35s;
    }

    .panel-title {
      font-size: 0.68rem;
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      transition: color 0.35s;
    }

    .panel-badge {
      font-size: 0.67rem;
      font-weight: 800;
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 0.18rem 0.65rem;
      border-radius: 20px;
      color: var(--muted);
      transition: background 0.35s, border-color 0.35s, color 0.35s;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.86rem;
    }

    th {
      text-align: left;
      padding: 0.65rem 1.4rem;
      font-size: 0.62rem;
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      transition: color 0.35s, border-color 0.35s;
    }

    td {
      padding: 0.85rem 1.4rem;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
      transition: background 0.15s, border-color 0.35s;
    }

    tr:last-child td {
      border-bottom: none;
    }

    tr:hover td {
      background: var(--surface);
    }

    .source-name {
      font-weight: 800;
      text-transform: capitalize;
    }

    .bar-wrap {
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .bar-track {
      flex: 1;
      height: 4px;
      background: var(--border);
      border-radius: 4px;
      overflow: hidden;
      transition: background 0.35s;
    }

    .bar-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 4px;
      transition: width 0.7s cubic-bezier(0.16, 1, 0.3, 1), background 0.35s;
    }

    .orders-badge {
      display: inline-block;
      padding: 0.13rem 0.55rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 0.72rem;
      font-weight: 800;
      transition: background 0.35s, border-color 0.35s;
    }

    .sum-cell {
      font-family: var(--font-num);
      font-weight: 700;
      text-align: right;
    }

    .chart-wrap {
      position: relative;
      height: 260px;
      padding: 1rem;
    }

    #empty {
      text-align: center;
      padding: 5rem 2rem;
    }

    #empty .empty-icon {
      font-size: 3rem;
      margin-bottom: 1rem;
      opacity: 0.2;
    }

    #empty p {
      font-weight: 700;
      color: var(--muted);
      font-size: 0.9rem;
      transition: color 0.35s;
    }

    .auth-area {
      text-align: center;
      padding: 4rem 2rem;
    }

    .auth-area p {
      font-size: 0.76rem;
      font-weight: 800;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1.5rem;
    }

    .btn-auth {
      display: inline-flex;
      align-items: center;
      gap: 0.75rem;
      background: var(--surface);
      border: 1.5px solid var(--border);
      color: var(--text);
      font-family: var(--font-display);
      font-weight: 800;
      font-size: 0.9rem;
      padding: 0.9rem 2rem;
      cursor: pointer;
      border-radius: 10px;
      text-decoration: none;
      transition: border-color 0.2s, background 0.35s, color 0.35s;
    }

    .btn-auth:hover {
      border-color: var(--accent);
    }

    .google-icon {
      width: 18px;
      height: 18px;
    }

    #auth-section {
      display: none;
    }

    #scan-section {
      display: none;
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo-block">
      <h1>Gmail<span>Scanner</span></h1>
      <p>Figures out how much you've spent on stuff</p>
    </div>
    <button class="theme-toggle" id="theme-toggle" aria-label="Toggle light/dark mode">
      <span class="toggle-icon moon">🌙</span>
      <span class="toggle-icon sun">☀️</span>
    </button>
  </div>
</header>

<main>

  <div id="auth-section">
    <div class="auth-area">
      <p>Connect your Gmail to get started</p>
      <a href="/oauth2/authorization/google" class="btn-auth">
        <svg class="google-icon" viewBox="0 0 24 24" fill="none">
          <path
              d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
              fill="#4285F4"/>
          <path
              d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
              fill="#34A853"/>
          <path
              d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"
              fill="#FBBC05"/>
          <path
              d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
              fill="#EA4335"/>
        </svg>
        Connect with Google
      </a>
    </div>
  </div>

  <div id="scan-section">
    <div class="controls">
      <div>
        <label for="group-select">Category</label><br/>
        <select id="group-select">
          <option value="food">🍕 Food</option>
          <option value="games">🎮 Games</option>
          <option value="shopping">🛒 Shopping</option>
          <option value="travel">🚗 Travel</option>
        </select>
      </div>
      <div>
        <label for="year-input">Year</label><br/>
        <input type="number" id="year-input"/>
      </div>
      <div style="align-self:flex-end">
        <button class="btn-scan" id="scan-btn" onclick="runScan()">Run Scan</button>
      </div>
    </div>

    <div class="error-msg" id="error-msg"></div>

    <div id="results">
      <div class="stats-row" id="stats-row"></div>

      <div class="result-banner">
        <div class="result-icon">👏</div>
        <div class="result-text" id="result-text"></div>
      </div>

      <div class="bottom-grid">
        <div class="panel">
          <div class="panel-header">
            <span class="panel-title">By Source</span>
            <span class="panel-badge" id="source-count">0 sources</span>
          </div>
          <table>
            <thead>
            <tr>
              <th>Source</th>
              <th>Orders</th>
              <th style="text-align:right">Total</th>
            </tr>
            </thead>
            <tbody id="sources-tbody"></tbody>
          </table>
        </div>

        <div class="panel">
          <div class="panel-header">
            <span class="panel-title">Spend Distribution</span>
          </div>
          <div class="chart-wrap">
            <canvas id="spend-chart"></canvas>
          </div>
        </div>
      </div>
    </div>

    <div id="empty">
      <div class="empty-icon">📭</div>
      <p>Run a scan to see your results.</p>
    </div>
  </div>

</main>

<script>
  // ---- Set year input to current year ----
  var currentYear = new Date().getFullYear();
  document.getElementById('year-input').value = currentYear;
  document.getElementById('year-input').setAttribute("max", currentYear);
  document.getElementById('year-input').setAttribute("min", 2020);

  let chartInstance = null;

  // =============================================
  // THEME TOGGLE
  // =============================================
  const html = document.documentElement;
  const toggleBtn = document.getElementById('theme-toggle');

  // On first load: respect OS preference, then remember user choice
  const saved = localStorage.getItem('theme');
  if (saved) {
    html.setAttribute('data-theme', saved);
  } else {
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    html.setAttribute('data-theme', prefersDark ? 'dark' : 'light');
  }

  toggleBtn.addEventListener('click', () => {
    const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    html.setAttribute('data-theme', next);
    localStorage.setItem('theme', next);
    if (chartInstance) {
      updateChartTheme();
    }
  });

  // Read live CSS variables so chart colours always match the theme
  function getThemeColors() {
    const s = getComputedStyle(html);
    return {
      border: s.getPropertyValue('--chart-border').trim(),
      tooltip: s.getPropertyValue('--tooltip-bg').trim(),
      tooltipBorder: s.getPropertyValue('--tooltip-border').trim(),
      muted: s.getPropertyValue('--muted').trim(),
      text: s.getPropertyValue('--text').trim(),
    };
  }

  function updateChartTheme() {
    const c = getThemeColors();
    chartInstance.data.datasets[0].borderColor = c.border;
    chartInstance.options.plugins.legend.labels.color = c.muted;
    chartInstance.options.plugins.tooltip.backgroundColor = c.tooltip;
    chartInstance.options.plugins.tooltip.borderColor = c.tooltipBorder;
    chartInstance.options.plugins.tooltip.titleColor = c.text;
    chartInstance.update();
  }

  // =============================================
  // AUTH CHECK
  // =============================================
  async function init() {
    try {
      const res = await fetch('/api/me');
      if (res.ok) {
        showScanSection();
      } else {
        showAuthSection();
      }
    } catch {
      showScanSection(); // fallback: Spring Security handles it
    }
  }

  function showAuthSection() {
    document.getElementById('auth-section').style.display = 'block';
    document.getElementById('scan-section').style.display = 'none';
  }

  function showScanSection() {
    document.getElementById('auth-section').style.display = 'none';
    document.getElementById('scan-section').style.display = 'block';
  }

  // =============================================
  // SCAN
  // =============================================
  async function runScan() {
    const group = document.getElementById('group-select').value;
    const year = document.getElementById('year-input').value;
    const btn = document.getElementById('scan-btn');
    const errEl = document.getElementById('error-msg');

    errEl.style.display = 'none';
    btn.textContent = 'Scanning…';
    btn.classList.add('loading');
    btn.disabled = true;

    try {
      const res = await fetch(`/scan/${group}/${year}`);
      if (!res.ok) {
        if (res.status === 401 || res.status === 403) {
          const body = await res.json().catch(() => ({}));
          if (body.error === 'insufficient_scope') {
            // Redirect to OAuth with prompt=consent to force scope re-grant
            window.location.href = '/oauth2/authorization/google?prompt=consent';
          } else {
            showAuthSection();
          }
          return;
        }
        throw new Error(`Server error: ${res.status}`);
      }
      renderResults(await res.json());
    } catch (e) {
      errEl.textContent = e.message || 'Something went wrong. Try again.';
      errEl.style.display = 'block';
      document.getElementById('results').style.display = 'none';
      document.getElementById('empty').style.display = 'block';
    } finally {
      btn.textContent = 'Run Scan';
      btn.classList.remove('loading');
      btn.disabled = false;
    }
  }

  const fmt = n =>
      new Intl.NumberFormat('en-US',
          {style: 'currency', currency: 'EUR', maximumFractionDigits: 2}).format(n);

  // Shrink font until text fits its container
  function fitText(el, maxPx = 35) {
    el.style.fontSize = maxPx + 'px';
    while (el.scrollWidth > el.parentElement.clientWidth - 36 && maxPx > 10) {
      el.style.fontSize = --maxPx + 'px';
    }
  }

  // =============================================
  // RENDER
  // =============================================
  function renderResults(data) {
    document.getElementById('empty').style.display = 'none';
    document.getElementById('results').style.display = 'block';

    const totalOrders = data.sources.reduce((s, r) => s + r.orders, 0);

    // Stat cards — data-emoji drives the watermark via CSS ::after
    document.getElementById('stats-row').innerHTML = `
      <div class="stat-card" data-emoji="💸">
        <div class="stat-label">Total Spent</div>
        <div class="stat-value">${fmt(data.totalSum)}</div>
      </div>
      <div class="stat-card" data-emoji="📅">
        <div class="stat-label">Monthly Avg</div>
        <div class="stat-value">${fmt(data.avgMonth)}</div>
      </div>
      <div class="stat-card" data-emoji="🛒">
        <div class="stat-label">Total Orders</div>
        <div class="stat-value">${totalOrders}</div>
      </div>
      <div class="stat-card" data-emoji="📆">
        <div class="stat-label">Period</div>
        <div class="stat-value stat-value--fit">${data.group.toUpperCase()} ${data.period}</div>
      </div>
    `;

    document.getElementById('result-text').textContent =
        data.msg || `You spent ${fmt(data.totalSum)} on ${data.group} in ${data.period}.`;

    requestAnimationFrame(() => {
      const el = document.querySelector('.stat-value--fit');
      if (el) {
        fitText(el);
      }
    });

    // Sources table
    const maxSum = Math.max(...data.sources.map(s => s.sum));
    document.getElementById('sources-tbody').innerHTML = data.sources
    .sort((a, b) => b.sum - a.sum)
    .map(s => {
      const pct = maxSum > 0 ? (s.sum / maxSum * 100).toFixed(1) : 0;
      const name = (s.source?.name || s.source || 'Unknown').toLowerCase().replace(/_/g, ' ');
      return `
          <tr>
            <td><span class="source-name">${name}</span></td>
            <td>
              <div class="bar-wrap">
                <div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div>
                <span class="orders-badge">${s.orders}x</span>
              </div>
            </td>
            <td class="sum-cell">${fmt(s.sum)}</td>
          </tr>`;
    }).join('');

    document.getElementById('source-count').textContent =
        `${data.sources.length} source${data.sources.length !== 1 ? 's' : ''}`;

    renderChart(data.sources);
  }

  function renderChart(sources) {
    if (chartInstance) {
      chartInstance.destroy();
      chartInstance = null;
    }

    const sorted = [...sources].sort((a, b) => b.sum - a.sum);
    const labels = sorted.map(
        s => (s.source?.name || s.source || 'Unknown').toLowerCase().replace(/_/g, ' '));
    const values = sorted.map(s => s.sum);
    const palette = ['#ff5757', '#ffd166', '#06d6a0', '#c084fc', '#38bdf8', '#fb923c', '#f472b6',
      '#a3e635'];
    const c = getThemeColors();

    chartInstance = new Chart(document.getElementById('spend-chart').getContext('2d'), {
      type: 'doughnut',
      data: {
        labels,
        datasets: [{
          data: values,
          backgroundColor: palette.slice(0, labels.length),
          borderColor: c.border,
          borderWidth: 3,
          hoverOffset: 10,
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        cutout: '68%',
        plugins: {
          legend: {
            position: 'bottom',
            labels: {
              color: c.muted,
              font: {family: "'Nunito', sans-serif", weight: '700', size: 12},
              padding: 16, boxWidth: 10, boxHeight: 10,
            }
          },
          tooltip: {
            backgroundColor: c.tooltip,
            borderColor: c.tooltipBorder,
            borderWidth: 1,
            titleColor: c.text,
            bodyColor: c.muted,
            titleFont: {family: "'Nunito', sans-serif", weight: 'bold'},
            bodyFont: {family: "'Rubik', sans-serif", size: 13},
            callbacks: {
              label: ctx => ` ${new Intl.NumberFormat('en-US',
                  {style: 'currency', currency: 'EUR'}).format(ctx.parsed)}`
            }
          }
        }
      }
    });
  }

  init();
</script>
</body>
</html>
