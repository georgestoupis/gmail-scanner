<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gmail Scanner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Rubik:wght@400;500;700;900&display=swap"
      rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo-block">
      <h1>Gmail<span>Scanner</span></h1>
      <p>Figures out how much you've spent on stuff</p>
    </div>
    <button class="theme-toggle" id="theme-toggle" aria-label="Toggle light/dark mode">
      <span class="toggle-icon moon">🌙</span>
      <span class="toggle-icon sun">☀️</span>
    </button>
  </div>
</header>

<main>

  <div id="auth-section">
    <div class="auth-area">
      <p>Connect your Gmail to get started</p>
      <a href="/oauth2/authorization/google" class="btn-auth">
        <svg class="google-icon" viewBox="0 0 24 24" fill="none">
          <path
              d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
              fill="#4285F4"/>
          <path
              d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
              fill="#34A853"/>
          <path
              d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"
              fill="#FBBC05"/>
          <path
              d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
              fill="#EA4335"/>
        </svg>
        Connect with Google
      </a>
    </div>
  </div>

  <div id="scan-section">
    <div class="controls">
      <div>
        <label for="group-select">Category</label><br/>
        <select id="group-select">
          <option value="food">🍕 Food</option>
          <option value="games">🎮 Games</option>
          <option value="shopping">🛒 Shopping</option>
          <option value="travel">🚗 Travel</option>
        </select>
      </div>
      <div>
        <label for="year-select">Year</label><br/>
        <select id="year-select"></select>
      </div>
      <div style="align-self:flex-end">
        <button class="btn-scan" id="scan-btn" onclick="runScan()">Run Scan</button>
      </div>
    </div>

    <div class="error-msg" id="error-msg"></div>

    <div id="results">
      <div class="stats-row" id="stats-row"></div>

      <div class="result-banner">
        <div class="result-icon">👍</div>
        <div class="result-text" id="result-text"></div>
      </div>

      <div class="bottom-grid">
        <div class="panel">
          <div class="panel-header">
            <span class="panel-title">By Source</span>
            <span class="panel-badge" id="source-count">0 sources</span>
          </div>
          <table>
            <thead>
            <tr>
              <th>Source</th>
              <th>Orders</th>
              <th style="text-align:right">Total</th>
            </tr>
            </thead>
            <tbody id="sources-tbody"></tbody>
          </table>
        </div>

        <div class="panel">
          <div class="panel-header">
            <span class="panel-title">Spend Distribution</span>
          </div>
          <div class="chart-wrap">
            <canvas id="spend-chart"></canvas>
          </div>
        </div>
      </div>
    </div>

    <div class="panel monthly-panel">
      <div class="panel-header">
        <span class="panel-title" id="breakdown-title">Monthly Breakdown</span>
        <span class="panel-badge" id="monthly-year-badge"></span>
      </div>
      <div class="bar-chart-wrap">
        <canvas id="monthly-chart"></canvas>
      </div>
    </div>

    <div id="empty">
      <div class="empty-icon">📭</div>
      <p>Run a scan to see your results.</p>
    </div>
  </div>

</main>

<script src="app.js"></script>
</body>
</html>
